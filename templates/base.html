<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Knowledge Time Machine — Explore how ideas evolve across time with AI-powered interactive timelines.">
    <title>{% block title %}Knowledge Time Machine{% endblock %}</title>

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind with our custom dark color palette
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f172a',  // Main background
                            800: '#1e293b',  // Card / panel background
                            700: '#334155',  // Borders and subtle dividers
                        },
                        primary: '#6366f1',     // Indigo — primary actions
                        accent: '#06b6d4',      // Cyan — accents
                        textLight: '#e2e8f0',   // Light text
                        textMuted: '#94a3b8',   // Muted / secondary text
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts — Inter for clean modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- D3.js for timeline visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Custom styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-dark-900 text-textLight font-sans min-h-screen antialiased">
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>

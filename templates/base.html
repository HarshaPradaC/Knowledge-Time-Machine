<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Knowledge Time Machine — Explore how ideas evolve across time with AI-powered interactive timelines.">
    <title>{% block title %}Knowledge Time Machine{% endblock %}</title>

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind with our custom modern-ancient color palette
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0a0a0a',  // Deep void/obsidian
                            800: '#15120f',  // Very dark sepia/brass shadow
                            700: '#2a241c',  // Burnished dark brown
                        },
                        primary: '#d4af37',     // Metallic Gold
                        accent: '#c07c40',      // Copper / Bronze
                        textLight: '#f3e5ab',   // Pale parchment / ivory
                        textMuted: '#a89f91',   // Aged document text
                    },
                    fontFamily: {
                        sans: ['Lora', 'serif'],
                        heading: ['Cinzel', 'serif'],
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts — Cinzel and Lora for ancient/classic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <!-- D3.js for timeline visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Custom styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-dark-900 text-textLight font-sans min-h-screen antialiased">
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
